<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KFZ Marburg – Danke!</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #FEEE02;
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --text: #F0EDE5;
    --text-muted: #888780;
    --border: rgba(254,238,2,0.2);
    --radius: 6px;
  }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
    text-align: center;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-top {
    padding: 40px 32px 28px;
    border-bottom: 1px solid var(--border);
  }
  .icon {
    width: 72px;
    height: 72px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    animation: popIn 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .icon svg {
    width: 32px;
    height: 32px;
    stroke: var(--gold);
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  /* cancelled state */
  .icon.cancelled {
    border-color: var(--text-muted);
  }
  .icon.cancelled svg {
    stroke: var(--text-muted);
  }
  h1 {
    font-family: 'Anton', sans-serif;
    font-size: 48px;
    line-height: 1;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }
  h1.grey {
    color: var(--text-muted);
  }
  .subtitle {
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 340px;
    margin: 0 auto;
  }
  .amount-badge {
    display: inline-block;
    background: rgba(254,238,2,0.12);
    border: 1px solid rgba(254,238,2,0.3);
    border-radius: 6px;
    padding: 10px 24px;
    margin: 20px 0 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .card-body {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .info-row:last-child {
    border-bottom: none;
  }
  .info-label {
    color: var(--text-muted);
  }
  .info-value {
    font-weight: 600;
    color: var(--text);
  }
  .card-footer {
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .btn-primary {
    display: block;
    width: 100%;
    background: var(--gold);
    border: none;
    border-radius: var(--radius);
    color: #111110;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s ease;
  }
  .btn-primary:hover {
    background: #ffc91a;
    transform: translateY(-1px);
  }
  .btn-secondary {
    display: block;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s ease;
  }
  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
  .footnote {
    padding: 14px 28px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .footnote svg {
    width: 14px;
    height: 14px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 1.5;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <!-- Content injected by JS -->
</div>
<script>
  // URL-Parameter lesen
  const params = new URLSearchParams(window.location.search);
  const success = params.get('success') === '1';
  const cancelled = params.get('cancelled') === '1';
  const amount = params.get('amount');
  const name = params.get('name') ? decodeURIComponent(params.get('name')) : 'Anonym';
  const card = document.getElementById('card');
  if (success) {
    // ── Erfolgreich gespendet ─────────────────────────────────────────────
    card.innerHTML = `
      <div class="card-top">
        <div class="icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>Danke!</h1>
        <p class="subtitle">
          Deine Spende macht den Unterschied.<br>
          Der Marburger Abend lebt – auch dank dir!
        </p>
        ${amount ? `<div class="amount-badge">${Number(amount).toLocaleString('de-DE')} €</div>` : ''}
      </div>
      <div class="card-body">
        <div class="info-row">
          <span class="info-label">Spender/in</span>
          <span class="info-value">${name}</span>
        </div>
        ${amount ? `
        <div class="info-row">
          <span class="info-label">Betrag</span>
          <span class="info-value">${Number(amount).toLocaleString('de-DE')} €</span>
        </div>` : ''}
        <div class="info-row">
          <span class="info-label">Verwendungszweck</span>
          <span class="info-value">Marburger Abend</span>
        </div>
        <div class="info-row">
          <span class="info-label">Veranstaltung</span>
          <span class="info-value">344. Marburger Abend</span>
        </div>
      </div>
      <div class="card-footer">
        <a href="/" class="btn-primary">Zurück zur Übersicht</a>
      </div>
      <div class="footnote">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        Alle Einnahmen fließen direkt in den Marburger Abend.
      </div>
    `;
    // Konfetti!
    setTimeout(() => {
      const end = Date.now() + 2500;
      const colors = ['#FEEE02', '#ffffff', '#FEEE02'];
      (function frame() {
        confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors });
        confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors });
        if (Date.now() < end) requestAnimationFrame(frame);
      }());
    }, 400);
  } else if (cancelled) {
    // ── Abgebrochen ───────────────────────────────────────────────────────
    card.innerHTML = `
      <div class="card-top">
        <div class="icon cancelled">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
        <h1 class="grey">Abgebrochen</h1>
        <p class="subtitle">
          Die Zahlung wurde abgebrochen.<br>
          Kein Geld wurde abgebucht.
        </p>
      </div>
      <div class="card-footer">
        <a href="/" class="btn-primary">Nochmal versuchen</a>
      </div>
      <div class="footnote">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        Es wurde kein Betrag abgebucht.
      </div>
    `;
  } else {
    // ── Fallback (direkt aufgerufen) ──────────────────────────────────────
    card.innerHTML = `
      <div class="card-top">
        <div class="icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>KFZ Marburg</h1>
        <p class="subtitle">344. Marburger Abend – Spendenmodul</p>
      </div>
      <div class="card-footer">
        <a href="/" class="btn-primary">Zur Spendenübersicht</a>
      </div>
    `;
  }
</script>
</body>
</html>
