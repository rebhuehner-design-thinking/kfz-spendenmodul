<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danke! – KFZ Marburg</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #FEEE02; --gold-dim: rgba(254,238,2,0.15);
    --bg: #0f0f0f; --bg-card: #1a1a1a;
    --text: #F0EDE5; --text-muted: #888780;
    --border: rgba(254,238,2,0.2); --radius: 6px;
  }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card { width: 100%; max-width: 480px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; text-align: center; animation: fadeUp 0.6s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  
  .card-top { padding: 48px 32px 36px; }
  
  .check-ring { width: 72px; height: 72px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; animation: scaleIn 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
  .check-ring svg { width: 32px; height: 32px; stroke: var(--gold); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  
  .danke-title { font-family: 'Anton', sans-serif; font-size: 64px; line-height: 0.9; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; }
  .danke-sub { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 28px; }
  
  .amount-box { background: var(--gold-dim); border: 1px solid var(--border); border-radius: 8px; padding: 16px 24px; display: inline-block; margin-bottom: 28px; }
  .amount-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 42px; color: var(--gold); line-height: 1; }
  .amount-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  
  .message { font-size: 15px; color: var(--text-muted); line-height: 1.7; max-width: 340px; margin: 0 auto; }
  .message strong { color: var(--text); font-weight: 500; }

  .card-divider { height: 1px; background: var(--border); }

  .card-bottom { padding: 28px 32px; }
  .event-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .event-name { font-family: 'Anton', sans-serif; font-size: 28px; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
  .event-date { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

  .back-btn { display: inline-block; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 14px; padding: 10px 24px; cursor: pointer; text-decoration: none; transition: all 0.15s ease; }
  .back-btn:hover { border-color: var(--gold); color: var(--gold); }

  .logo { padding: 20px; border-top: 1px solid var(--border); }
  .logo img { height: 40px; width: auto; }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>

<div class="card">

    <div class="check-ring">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <div class="danke-title">Danke!</div>
    <div class="danke-sub" id="donor-greeting">Für deine Unterstützung</div>
    <div class="amount-box">
      <div class="amount-value" id="amount-display">10 €</div>
      <div class="amount-label">Deine Spende</div>
    </div>
    <p class="message">
      Du hilfst dabei, dass <strong>Tiefstrom</strong> faire Honorare zahlen kann und unabhängige Clubkultur in Marburg weiterlebt. Wir freuen uns auf dich!
    </p>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const amount = params.get('amount') || '10';
  const name = params.get('name') || '';

  document.getElementById('amount-display').textContent = parseInt(amount).toLocaleString('de-DE') + ' €';
  if (name && name !== 'Anonym') {
    document.getElementById('donor-greeting').textContent = 'Danke, ' + name + '!';
  }

  // Confetti
  setTimeout(() => {
    const end = Date.now() + 2000;
    const colors = ['#FEEE02', '#ffffff'];
    (function frame() {
      confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors, scalar: 1.1 });
      confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors, scalar: 1.1 });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }, 400);
